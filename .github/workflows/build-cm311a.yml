name: build-cm311a
on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择 LuCI 版本"
        required: false
        default: "24.10.5"
        type: choice
        options:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
      skip_imagebuilder:
        description: "是否跳过 ImageBuilder，直接用预构建 rootfs"
        required: true
        type: boolean
        default: true
      rootfs_version:
        description: "预构建 rootfs 版本"
        required: true
        default: "24.10.2"
      builder_name:
        description: "打包作者名称"
        required: true
        default: "yjga2025"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug workspace
        run: ls -R

      - name: Download prebuilt rootfs
        if: ${{ github.event.inputs.skip_imagebuilder == 'true' }}
        run: |
          mkdir -p bin/targets/armsr/armv8
          curl -L -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
          https://github.com/wukongdaily/AutoBuildImmortalWrt/releases/download/rootfs/immortalwrt-${{ github.event.inputs.rootfs_version }}-armsr-armv8-generic-rootfs.tar.gz

      - name: Find rootfs
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ Found: $ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ rootfs 未找到"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: Package CM311A firmware
        uses: wukongdaily/flippy-openwrt-actions@master
        env:
          OPENWRT_ARMVIRT: ${{ steps.find_rootfs.outputs.file }}
          PACKAGE_SOC: s905l3a
          KERNEL_AUTO_LATEST: false
          WHOAMI: ${{ github.event.inputs.builder_name }}

      - name: Rename firmware
        id: rename
        run: |
          FILE=$(ls ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz | head -n1)
          echo "Image file is: $FILE"
          FILENAME=$(basename "$FILE")
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          LUCI_VERSION="${{ github.event.inputs.luci_version }}"
          mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/immortalwrt-$LUCI_VERSION-cm311a-btrfs.img.gz"

      - name: Upload firmware to GitHub Releases
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: cm311a
          name: ImmortalWrt CM311A
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
